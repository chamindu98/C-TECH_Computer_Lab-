<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments - C-TECH</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">

    <style>
        /* CSS Root වර්ණ (පැරණි පිටු වල වර්ණ තේමාවම වේ) */
        :root {
            --primary-blue: #004d80;
            --light-blue: #00a4e4;
            --orange: #ff7300;
            --dark-bg: #0b132b;
            --card-bg: #1c2541;
            --text-light: #f4f7f6;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
        }
        
        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 164, 228, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 115, 0, 0.1) 0px, transparent 50%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            color: var(--text-light); 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            min-height: 100vh;
        }
        
        .web-container { 
            width: 100%; 
            max-width: 1100px; 
            background-color: rgba(28, 37, 65, 0.85); 
            backdrop-filter: blur(10px); 
            border: 2px solid var(--light-blue); 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 0 30px rgba(0, 164, 228, 0.3);
            padding: 25px;
        }
        
        header { 
            background: linear-gradient(135deg, rgba(11,19,43,0.9) 0%, rgba(28,37,65,0.9) 100%); 
            text-align: center; 
            padding: 30px 20px; 
            border-bottom: 2px solid var(--light-blue); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            border-radius: 12px;
            margin-bottom: 25px;
        }
        
        .logo-container { 
            width: 130px; 
            height: 130px; 
            background-color: white; 
            border-radius: 50%; 
            padding: 3px; 
            overflow: hidden; 
            border: 2px solid var(--light-blue); 
            box-shadow: 0 0 25px var(--light-blue);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .logo-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%;
        }
        
        header h1 { 
            font-size: 2.2rem; 
            color: #fff;
            text-shadow: 0 0 10px var(--light-blue);
        }
        
        /* ප්‍රධාන ටැබ් තීරුව */
        .main-tab-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background-color: var(--card-bg); 
            border: 1px solid var(--light-blue); 
            border-radius: 8px; 
            overflow: hidden; 
            margin-bottom: 30px; 
            width: 100%;
        }
        
        .main-tab-bar .tab-btn { 
            flex: 1;
            text-align: center; 
            padding: 15px 20px; 
            color: #f4f7f6;
            font-size: 1rem;
            font-weight: 600; 
            text-decoration: none; 
            cursor: pointer;
            transition: all 0.3s ease;
            border-right: 1px solid rgba(0, 164, 228, 0.2);
            background: transparent;
            outline: none;
        }
        
        .main-tab-bar .tab-btn:last-child { border-right: none; }
        .main-tab-bar .tab-btn:hover { background-color: rgba(0, 164, 228, 0.15); color: var(--light-blue); }
        .main-tab-bar .tab-btn.active { background-color: var(--light-blue); color: #ffffff; font-weight: bold; box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2); }

        .inner-page { padding: 10px 5px; }
        .inner-page h2 { color: var(--light-blue); font-size: 1.6rem; margin-bottom: 25px; border-bottom: 2px solid rgba(0, 164, 228, 0.3); padding-bottom: 10px; }
        
        /* 🛠️ Assignment Row Layout (ඔයා එවපු ආකෘතියට අනුව) */
        .assignment-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .assignment-row {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        /* වම් පැත්තේ ඇති Grade බට්ටා */
        .grade-badge {
            background-color: var(--card-bg);
            border: 2px solid var(--light-blue);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            width: 90px;
            height: 75px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0; /* ප්‍රමාණය කුඩා වීම වැළැක්වීමට */
        }
        
        .grade-badge span {
            font-size: 0.75rem;
            color: var(--light-blue);
            text-transform: uppercase;
        }

        /* මැද ඇති දිගු Assignment විස්තර තීරුව */
        .assignment-details-bar {
            flex: 1;
            background-color: var(--card-bg);
            border: 1px solid rgba(0, 164, 228, 0.4);
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            height: 75px;
        }

        .assignment-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        /* දකුණු පැත්තේ ඇති Open බොත්තම */
        .open-btn {
            background-color: transparent;
            border: 2px solid var(--light-blue);
            color: var(--light-blue);
            padding: 8px 24px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .open-btn:hover {
            background-color: var(--orange);
            border-color: var(--orange);
            color: white;
            box-shadow: 0 0 15px rgba(255, 115, 0, 0.4);
            transform: scale(1.05);
        }

        .back-btn { margin-top: 15px; background-color: rgba(0, 164, 228, 0.1); border: 1px solid var(--light-blue); color: var(--light-blue); padding: 12px 24px; font-weight: bold; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.3s; }
        .back-btn:hover { background-color: var(--light-blue); color: #0b132b; transform: translateX(-4px); }

        /* --- RESPONSIVE MOBILE VIEW --- */
        @media screen and (max-width: 650px) {
            body { padding: 10px; }
            .web-container { padding: 15px; }
            header { padding: 20px 10px; }
            header h1 { font-size: 1.6rem; }
            
            .main-tab-bar { flex-wrap: wrap; }
            .main-tab-bar .tab-btn { flex: unset; width: 50%; padding: 12px 10px; font-size: 0.95rem; border-bottom: 1px solid rgba(0, 164, 228, 0.2); }
            .main-tab-bar .tab-btn:nth-child(2n) { border-right: none; }
            .main-tab-bar .tab-btn:nth-child(3), .main-tab-bar .tab-btn:nth-child(4) { border-bottom: none; }
            
            .logo-container { width: 100px; height: 100px; }
            .inner-page h2 { font-size: 1.3rem; }

            /* මොබයිල් ෆෝන් වලදී Row එක පිළිවෙලට හැදීම */
            .assignment-row { flex-direction: column; align-items: flex-start; gap: 8px; background: rgba(28, 37, 65, 0.5); padding: 12px; border-radius: 12px; border: 1px solid rgba(0, 164, 228, 0.2); }
            .grade-badge { width: 100%; height: 40px; flex-direction: row; gap: 8px; border-radius: 6px; }
            .assignment-details-bar { width: 100%; height: auto; flex-direction: column; gap: 15px; align-items: flex-start; padding: 10px 5px; background: transparent; border: none; box-shadow: none; }
            .open-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

            <h1>C-TECH - Assignments</h1>

        <nav class="main-tab-bar">

                <div class="assignment-row">

</body>
</html>
