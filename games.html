<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-TECH - IT Educational Games</title>
    <style>
        /* CSS Root වර්ණ - ලෝගෝ එකට අනුව */
        :root {
            --primary-blue: #004d80;
            --light-blue: #00a4e4;
            --orange: #ff7300;
            --dark-bg: #0b132b;
            --card-bg: #1c2541;
            --text-light: #f4f7f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            /* IT Related Technology Background */
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 164, 228, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 115, 0, 0.1) 0px, transparent 50%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        /* ප්‍රධාන ආකෘතිය (Fixed Container Name) */
        .web-container {
            width: 100%;
            max-width: 1100px;
            background-color: rgba(28, 37, 65, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid var(--light-blue);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 164, 228, 0.3);
            padding: 25px; /* ඇතුළත ඉඩ ලස්සනට තබා ගැනීමට */
        }

        /* 1. ප්‍රධාන ශීර්ෂය (Header Section) */
        header {
            background: linear-gradient(135deg, rgba(11,19,43,0.9) 0%, rgba(28,37,65,0.9) 100%);
            text-align: center;
            padding: 30px 20px;
            border-bottom: 2px solid var(--light-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        /* ලෝගෝ එක රඳවන බහාලුම */
        .logo-container {
            width: 130px;
            height: 130px;
            background-color: white;
            border-radius: 50%;
            padding: 3px;
            box-shadow: 0 0 25px var(--light-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid var(--light-blue);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        header h1 {
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 10px var(--light-blue);
        }

        header p {
            font-size: 1.1rem;
            color: var(--light-blue);
            font-weight: 500;
        }

        /* --- ටැබ් බාර් එක --- */
        .main-tab-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            border: 1px solid var(--light-blue);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
            width: 100%;
        }

        .main-tab-bar .tab-btn {
            flex: 1;
            text-align: center;
            padding: 15px 20px;
            color: #f4f7f6;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border-right: 1px solid rgba(0, 164, 228, 0.2);
        }

        .main-tab-bar .tab-btn:last-child {
            border-right: none;
        }

        .main-tab-bar .tab-btn:hover {
            background-color: rgba(0, 164, 228, 0.15);
            color: var(--light-blue);
        }

        .main-tab-bar .tab-btn.active {
            background-color: var(--light-blue);
            color: #ffffff;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* පිටුවේ ප්‍රධාන මාතෘකාව */
        .page-title {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(0, 164, 228, 0.3);
            padding-bottom: 10px;
        }

        /* --- ගේම් ග්‍රිඩ් සහ කාඩ් හැඩගැන්වීම් --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .game-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(0, 164, 228, 0.3);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 164, 228, 0.2);
            border-color: var(--light-blue);
        }

        .game-card h3 {
            color: #fff;
            font-size: 1.25rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-card p {
            color: #a0aec0;
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* ක්‍රීඩා කරන කලාපය (Game Area) */
        .game-area {
            background-color: rgba(11, 19, 43, 0.6);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            border: 1px dashed rgba(0, 164, 228, 0.4);
        }

        .game-area h2 {
            font-size: 2.2rem;
            color: var(--orange);
            letter-spacing: 4px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 115, 0, 0.3);
        }

        /* ඉන්පුට් සහ බොත්තම් හැඩගැන්වීම් */
        .game-area input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: var(--dark-bg);
            border: 1px solid rgba(0, 164, 228, 0.5);
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.3s;
        }

        .game-area input[type="number"]:focus {
            border-color: var(--light-blue);
            box-shadow: 0 0 8px rgba(0, 164, 228, 0.4);
        }

        .game-area button, .btn-group button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #008cd1, var(--light-blue));
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .game-area button:hover, .btn-group button:hover {
            background: linear-gradient(90deg, var(--light-blue), #00b4ff);
            box-shadow: 0 0 15px rgba(0, 164, 228, 0.4);
        }

            transform: scale
